<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Research Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        🧠 AI Research Assistant
    </div>

    <!-- CHAT AREA -->
    <div id="chat" class="chat-box">

        <!-- EMPTY STATE -->
        <div id="empty" class="empty">
            Ask anything... I will generate a full research report 🚀
        </div>

    </div>

    <!-- INPUT AREA -->
    <div class="input-box">
        <input 
            id="input" 
            type="text" 
            placeholder="Message AI Research..." 
            autocomplete="off"
        />
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
